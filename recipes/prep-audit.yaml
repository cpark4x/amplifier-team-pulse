name: prep-audit
description: >
  Outcome-first weekly audit. Scans repos for activity, reads summary.md
  clusters when available, matches against commitments and outcomes, and
  generates three views: per-person IC review, flat manager audit, and
  leadership narrative.
version: "0.3.0"
tags: ["audit", "weekly", "automation", "outcomes"]

# Usage:
#   "Prep the audit"
#   amplifier tool invoke recipes operation=execute recipe_path=@team-pulse:recipes/prep-audit.yaml
#   amplifier tool invoke recipes operation=execute recipe_path=@team-pulse:recipes/prep-audit.yaml context='{"week": "2026-W12"}'

context:
  week: ""  # Optional: defaults to current ISO week

steps:
  - id: prepare-audit
    agent: self
    timeout: 900
    output: audit_result
    prompt: |
      You are preparing the weekly outcome-first audit for Team Pulse. This is
      an automated process — no user interaction needed. Read data, scan repos,
      match activity against commitments and outcomes, and generate audit views.

      ## Step 1: Determine the Week

      {% if week != "" %}
      Use week: {{week}}
      {% else %}
      Run `date +%Y-W%V` to get the current ISO week identifier.
      {% endif %}

      Calculate the Monday and Sunday dates for this week.

      ## Step 2: Read Org Structure and Person Data

      1. **Read `org.yaml`** to get:
         - Full member list with roles and reporting structure
         - Team definitions (which members belong to which team)
         - Showcase config

      2. **For each IC and manager member**, determine their lowercase directory name:
         - "Chris P" → `chris`, "Gurkaran" → `gurkaran`, "Manoj" → `manoj`
         - "Ken" → `ken`, "Salil Das" → `salil`, "Samuel Lee" → `samuel`
         - "Alex Lopez" → `alex`

      3. **For each member, read:**
         - `people/<name>/profile.yaml` — GitHub handles, repos, auto_discover
         - `people/<name>/outcomes.md` — quarterly outcomes (IDs and descriptions)
         - `people/<name>/weeks/<WEEK_ID>/commitments.md` — this week's commitments

         If any file doesn't exist, note it and continue.

      ## Step 3: Load Activity Data (summary.md preferred, raw files as fallback)

      For each member, check whether `people/<name>/weeks/<WEEK_ID>/summary.md`
      exists.

      **If summary.md exists:**
      - Read it. It contains activity clusters grouped by `owner/repo`, each with
        a `drives:` tag indicating which outcome the cluster contributes to.
      - Use the activity clusters and `drives:` tags from the summary as the
        **primary data source** for this member. Do NOT re-read raw activity files
        or re-scan repos — the summary already consolidates that work.

      **If summary.md does not exist (graceful fallback):**
      - Fall back to reading raw `people/<name>/activity/<DATE>.md` files:
        list files in the activity directory and read those whose dates fall
        within Monday–Sunday of the target week.
      - If no activity files exist either, fall back to scanning repos directly
        (see Step 4).

      This fallback is graceful — the recipe works whether 0, some, or all
      members have summaries.

      ## Step 4: Scan Repos for Activity (only if no activity data from Step 3)

      If a member has neither a summary.md nor daily activity files, scan their
      repos directly:

      For each member with GitHub handles and repos configured, try all handles:

      **Merged PRs this week:**
      ```
      gh pr list --repo <owner/repo> --state merged --search "merged:>=<MONDAY>" --author <handle> --json number,title,mergedAt,headRefName --limit 50
      ```

      **Open PRs:**
      ```
      gh pr list --repo <owner/repo> --state open --author <handle> --json number,title,createdAt,headRefName --limit 50
      ```

      **Recent commits:**
      ```
      gh api "repos/<owner/repo>/commits?since=<MONDAY>T00:00:00Z&until=<SUNDAY>T23:59:59Z&author=<handle>" --jq '.[] | .sha[:7] + " " + .commit.message'
      ```

      Handle account switching as needed. Merge and deduplicate results.

      **Auto-discover** for members with `auto_discover: true`:
      ```
      gh api "users/<handle>/events?per_page=100" --jq '[.[] | select(.created_at >= "<MONDAY>T00:00:00Z") | .repo.name] | unique | .[]'
      ```

      ## Step 5: Match Activity Against Commitments

      For each member's commitments:

      - **Shipped** — PR merged whose title, branch name, or commit messages relate
        to the commitment's description or outcome
      - **Partial** — Activity exists but incomplete: open PR, WIP branch, partial work
      - **No activity** — Nothing found matching this commitment
      - **Unmatched** — Commitment has no repo tag; cannot assess automatically

      Be generous with matching. Use PR titles, branch names, and commit messages.

      For members who didn't log commitments: note "no commitments logged" but
      still report any repo activity under "Unlinked Activity".

      ## Step 6: Calculate Metrics

      For each member, calculate:
      - **Must-ship total** and **shipped count**
      - **Alignment %** = (commitments with a `drives:` field that is NOT "none") / (total commitments) × 100

      For each team, aggregate:
      - Total outcomes, on-track count, at-risk count
      - Team alignment % (average of member alignment)

      ## Step 7: Write Per-Person Audit Files

      For each member, write to:
      `people/<name>/weeks/<WEEK_ID>/audit.md`

      ```
      # <Name> -- Audit for Week of <MONDAY_DATE>

      ## Outcome Progress

      ### <outcome-id>: <outcome description snippet>
      Status: <On track / At risk / No activity>
      Commitments driving this outcome:
      - <commitment> — <Shipped/Partial/No activity> — <evidence>

      ### <next outcome>
      ...

      ## Unconnected Work
      Commitments with drives: none
      - <commitment> — <status> — <evidence>

      ## Unmatched Activity
      Activity not tied to any commitment:
      - <repo>: PR #<N> "<title>" merged

      ## Untracked Repos
      Activity in repos not in profile.yaml:
      - <owner/repo>: <N> commits

      ## Scorecard
      Must-ship: <shipped>/<total> (<rate>%)
      Alignment: <alignment>%
      ```

      Omit any section with no data.

      ## Step 8: Write IC Review Files

      For each member with activity this week, write to:
      `people/<name>/weeks/<WEEK_ID>/review.md`

      The IC review is personal — it shows only that person's activity but
      includes cross-team awareness of who else is driving the same outcomes.

      ```
      # <Name> — Week Review for <WEEK_ID>

      ## Your Activity
      ### <owner/repo> (<N> commits)
      <One-line summary>
      Drives: <outcome-id or "unlinked">

      ## Outcomes You Contributed To
      ### <outcome-id>: <outcome description snippet>
      Your contributions: <summary of your clusters driving this outcome>
      Teammates also driving this: <names of others with clusters driving same outcome>

      ## Unlinked Activity
      <clusters with empty drives: fields — activity not connected to any outcome>
      ```

      Omit "Teammates also driving this:" if no teammates share the outcome.
      Omit "Unlinked Activity" section if all clusters have a drives: value set.

      ## Step 9: Write Manager Audit View

      Write the consolidated manager audit to a flat path:
      `views/audit-<WEEK_ID>.md`

      This replaces the old per-team and per-manager nested files. Group by
      outcome (outcome-first), not by person:

      ```
      # Team Audit — Week of <MONDAY_DATE>

      ## Outcome Progress

      ### <outcome-id>: <outcome description snippet>
      Status: <On track / At risk / Stalled / No contributors>
      Contributors: <names>
      This week:
      - <person>: <commitment> — <Shipped/Partial/No activity>

      ### <next outcome>
      ...

      ## Unlinked Activity
      Activity not connected to any defined outcome:
      - <Name>: <repo> — <summary> (<N> commits)

      ## Team Scorecard
      | Member | Must-Ship | Shipped | Rate | Alignment |
      |--------|-----------|---------|------|-----------|
      | <name> | <N>       | <N>     | <N>% | <N>%      |
      ```

      ## Step 10: Write Leadership View

      Write the leadership narrative to:
      `views/leadership-<WEEK_ID>.md`

      This view is designed for Sam — a VP who needs to understand the state
      in 30 seconds. Narrative paragraphs, not tables.

      ```
      # Leadership View — Week of <MONDAY_DATE>

      ## Outcome Progress

      ### <outcome-id>: <outcome description snippet>
      Status: <On track / At risk / Stalled / No contributors>
      Contributors: <names>
      This week: <narrative paragraph summarizing what was done toward this outcome>

      ### <next outcome>
      ...

      ## Unlinked Activity
      Activity not connected to any defined outcome:
      - <Name>: <repo> — <summary> (<N> commits)

      ## Team Health
      - Members with activity: <N>/<total>
      - Outcomes with active contributors: <N>/<total>
      - Alignment rate: <clusters with drives: set / total clusters> %
      ```

      ## Step 11: Update CHANGELOG.md

      Calculate the scorecard and append a new row to `CHANGELOG.md`:

      ```
      | <WEEK_SHORT> | <must_ship> | <shipped> | <rate>% | <carried> | <alignment>% |
      ```

      If the CHANGELOG table doesn't have an Alignment column yet, add it to
      the header row first:
      ```
      | Week | Must-Ship | Shipped | Rate | Carried Forward | Alignment |
      |------|-----------|---------|------|-----------------|-----------|
      ```

      ## Step 12: Commit and Push

      ```
      git add people/*/weeks/*/audit.md people/*/weeks/*/review.md views/audit-*.md views/leadership-*.md CHANGELOG.md
      git commit -m "audit: generate week <WEEK_ID>"
      git push
      ```
