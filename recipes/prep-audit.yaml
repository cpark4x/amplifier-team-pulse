name: prep-audit
description: >
  Automated audit preparation. Scans tracked repos for activity via gh CLI,
  matches against weekly commitments, generates audit.md with status and
  evidence, and appends a scorecard row to CHANGELOG.md.
version: "0.1.0"
tags: ["audit", "weekly", "automation"]

# Usage:
#   "Prep the audit"
#   amplifier tool invoke recipes operation=execute recipe_path=@team-pulse:recipes/prep-audit.yaml
#   amplifier tool invoke recipes operation=execute recipe_path=@team-pulse:recipes/prep-audit.yaml context='{"week": "2026-W12"}'

context:
  week: ""  # Optional: defaults to current ISO week

steps:
  - id: prepare-audit
    agent: self
    timeout: 900
    output: audit_result
    prompt: |
      You are preparing the weekly audit for Team Pulse. This is an automated
      process — no user interaction needed. Read data, scan repos, match
      activity against commitments, and generate the audit document.

      ## Step 1: Determine the Week

      {% if week != "" %}
      Use week: {{week}}
      {% else %}
      Run `date +%Y-W%V` to get the current ISO week identifier.
      {% endif %}

      Calculate the Monday and Sunday dates for this week. You'll need these
      for the `gh` CLI date filters and the audit header.

      ## Step 2: Read Inputs

      1. **Read `team.yaml`** to get the full team roster.
         - Each member has a `github:` field that is a **list of handles** (e.g., personal
           and Microsoft accounts). Collect all handles per member.
         - Each member has a `repos:` list of tracked repositories.
      2. **Read all commitment files** from `weeks/<WEEK_ID>/commitments/`
         - List all `.md` files in that directory
         - Parse each one to extract commitments with their outcome, repo, and priority
         - Note which members have commitment files and which don't

      ## Step 3: Scan Repos for Activity

      For each team member, scan each of their repos listed in `team.yaml`
      using the `gh` CLI.

      **Account switching:** The `gh` CLI may have multiple accounts authenticated
      (e.g., a personal account and a Microsoft account). Before scanning a repo,
      determine which `gh` account can access it:
      - Check which account is currently active: `gh auth status`
      - If the repo org doesn't match the active account's access, switch:
        `gh auth switch --user <appropriate_handle>`
      - If a scan fails with 404, try switching to the member's other handle and retry.
      - After all scanning is complete, switch back to the original active account.

      For each member/repo combination, try **all of the member's github handles**
      as the `--author` filter (activity may be under any of their accounts):

      **Merged PRs this week (by this member):**
      ```
      gh pr list --repo <owner/repo> --state merged --search "merged:>=<MONDAY>" --author <github_handle> --json number,title,mergedAt,headRefName --limit 50
      ```

      **Open PRs by this member:**
      ```
      gh pr list --repo <owner/repo> --state open --author <github_handle> --json number,title,createdAt,headRefName --limit 50
      ```

      **Recent commits on default branch by this member:**
      ```
      gh api "repos/<owner/repo>/commits?since=<MONDAY>T00:00:00Z&until=<SUNDAY>T23:59:59Z&author=<github_handle>" --jq '.[] | .sha[:7] + " " + .commit.message'
      ```

      Run the above for **each handle** the member has. Merge the results (deduplicate
      by PR number or commit SHA if the same activity appears under multiple handles).

      Collect ALL output. If a command fails (e.g., repo not found, no permissions),
      note the error and continue — don't stop the entire audit.

      ## Step 4: Match Activity Against Commitments

      For each member's commitments, match against the scanned repo activity:

      - **Shipped** — PR merged whose title, branch name, or commit messages clearly
        relate to the commitment's description or outcome
      - **Partial** — Activity exists but doesn't look complete: open PR with commits,
        WIP branch, or partial work visible
      - **No activity** — Nothing found in the tagged repo matching this commitment
      - **Unmatched** — Commitment has no repo tag; cannot assess automatically

      Be generous with matching. If a PR title is clearly related to a commitment
      description, count it as a match. Use PR titles, branch names, and commit
      messages for matching — not just exact string comparison.

      For members who didn't log commitments: note "no commitments logged" but
      still report any repo activity under "Unmatched Activity".

      ## Step 5: Discover Untracked Repos

      For each team member, check if they had activity in repos NOT listed in
      their `team.yaml` repos. Use the GitHub Events API on each of their handles:

      ```
      gh api "users/<github_handle>/events?per_page=100" --jq '[.[] | select(.created_at >= "<MONDAY>T00:00:00Z") | .repo.name] | unique | .[]'
      ```

      Run this for **each handle** the member has. Combine the results into one
      list of repos with activity this week.

      Compare against their `repos:` list in `team.yaml`. Any repo that shows
      activity but is NOT tracked gets flagged. For each flagged repo, count
      the commits:

      ```
      gh api "repos/<owner/repo>/commits?since=<MONDAY>T00:00:00Z&until=<SUNDAY>T23:59:59Z&author=<github_handle>" --jq 'length'
      ```

      Include the results in a "Untracked Repos" section per member in the audit
      (see format below). This ensures no work falls through the cracks even if
      someone forgot to mention a repo during `log-commitments`.

      If account switching is needed (see Step 3), apply the same switching logic.
      If a command fails, skip that handle/repo and continue.

      ## Step 6: Write audit.md

      Write the audit file to `weeks/<WEEK_ID>/audit.md` using this exact format:

      ```
      # Audit -- Week of <MONDAY_DATE>

      ## <Member Name>

      ### Must-Ship

      | Commitment | Status | Evidence |
      |------------|--------|----------|
      | <description> | Shipped | PR #<N> "<title>" merged <date> |
      | <description> | No activity | No matching commits/PRs in <repo> |

      ### Stretch

      | Commitment | Status | Evidence |
      |------------|--------|----------|
      | <description> | Partial | PR #<N> "<title>" open, <X> commits |

      ### Unmatched Activity

      | Repo | Activity | Notes |
      |------|----------|-------|
      | <repo> | PR #<N> "<title>" merged | Not tied to a commitment |

      ### Untracked Repos

      Activity found in repos not listed in team.yaml:

      | Repo | Commits | Notes |
      |------|---------|-------|
      | <owner/repo> | <N> commits | Not tracked -- consider adding to team.yaml |
      ```

      Repeat the member section for every team member. Include members who
      didn't log commitments (show only Unmatched Activity and Untracked Repos
      for them with a note: "<Name>: no commitments logged").

      Omit any subsection that has no data (Must-Ship, Stretch, Unmatched
      Activity, Untracked Repos).

      ## Step 7: Update CHANGELOG.md

      Calculate the scorecard from the audit:
      - **Must-Ship:** Total must-ship commitments across all members
      - **Shipped:** Must-ship items with status "Shipped"
      - **Rate:** Shipped / Must-Ship as percentage (e.g., 75%)
      - **Carried Forward:** Must-ship items NOT shipped (No activity + Partial)

      Append a new row to the table in `CHANGELOG.md`:
      ```
      | <WEEK_SHORT> | <must_ship> | <shipped> | <rate>% | <carried> |
      ```
      Where <WEEK_SHORT> is just the week part, e.g., "W12".

      ## Step 8: Commit and Push

      - `git add weeks/<WEEK_ID>/audit.md CHANGELOG.md`
      - `git commit -m "audit: generate week <WEEK_ID>"`
      - `git push`
