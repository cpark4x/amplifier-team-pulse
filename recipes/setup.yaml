name: setup
description: >
  One-time interactive setup for a new team. Creates team.yaml,
  initial folder structure, and configures rhythm and webhook settings.
version: "0.1.0"
tags: ["setup", "onboarding", "one-time"]

# Usage:
#   "Set up team pulse"
#   amplifier tool invoke recipes operation=execute recipe_path=@team-pulse:recipes/setup.yaml

context: {}

steps:
  - id: setup-team
    timeout: 600
    output: setup_result
    prompt: |
      You are setting up Team Pulse for a new team. Walk the manager through
      the configuration interactively.

      ## Step 1: Gather Team Info

      Ask the manager:
      1. **Team members** — for each person:
         - Name
         - GitHub handle
         - Role (mark one person as "manager")
         - Which repos do they work in? (owner/repo format)
      2. **Rhythm** — or accept defaults:
         - Commitment day (default: monday)
         - Audit prep day (default: friday)
         - Meeting day (default: monday)
      3. **Showcase distribution:**
         - Team channel webhook URL (or env var name, default: $TEAM_PULSE_TEAM_WEBHOOK)
         - Leadership webhook URL (or env var name, default: $TEAM_PULSE_LEADERSHIP_WEBHOOK)
         - Leadership recipient name (e.g., "Sam")

      ## Step 2: Create team.yaml

      Write `team.yaml` with the gathered info using this format:

      ```yaml
      team:
        - name: <Name>
          github: <handle>
          role: manager
          repos:
            - <owner/repo>
        - name: <Name>
          github: <handle>
          repos:
            - <owner/repo>

      rhythm:
        commitment_day: <day>
        audit_prep_day: <day>
        meeting_day: <day>

      showcase:
        team:
          channel: $TEAM_PULSE_TEAM_WEBHOOK
          tone: celebratory
        leadership:
          channel: $TEAM_PULSE_LEADERSHIP_WEBHOOK
          recipient: <Name>
          tone: outcomes
      ```

      ## Step 3: Create .env File

      If the manager provides actual webhook URLs (not just env var names),
      create a `.env` file with them. Otherwise, remind them to copy
      `.env.example` to `.env` and fill in the URLs later.

      ## Step 4: Create Initial Folder Structure

      ```
      mkdir -p weeks
      mkdir -p context
      mkdir -p recipes
      ```

      Verify that `CHANGELOG.md`, `.gitignore`, and `bundle.md` exist.
      If any are missing, inform the manager.

      ## Step 5: Commit and Push

      - `git add -A`
      - `git commit -m "feat: initial team pulse setup"`
      - `git push`

      ## Step 6: Confirm

      Tell the manager:
      - Setup is complete
      - Team members need contributor access to the repo
      - Team members install the bundle: add it in their Amplifier settings
      - First step: everyone runs `log-commitments` on Monday
